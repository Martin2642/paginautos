<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autos Premium</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- MENÚ -->
    <nav>
        <ul class="menu">
            <li><a href="#home">Inicio</a></li>
            <li><a href="#ofertas">Ofertas</a></li>
            <li><a href="#galeria">Galería</a></li>
            <li><a href="#contacto">Contacto</a></li>
        </ul>
    </nav>

    <!-- HEADER -->
    <header id="home">
        <h1>AutoCar</h1>
        <p>Encuentra el auto de tus sueños</p>
    </header>

    <!-- OFERTAS -->
    <section id="ofertas">
        <h2>Ofertas Destacadas</h2>
        <div class="ofertas-container">

            <div class="card">
                <img src="img/auto1.jpg" alt="Auto deportivo rojo">
                <h3>Deportivo X</h3>
                <p>$15.000.000</p>
            </div>

            <div class="card">
                <img src="img/auto2.jpg" alt="SUV familiar">
                <h3>SUV Familiar</h3>
                <p>$12.500.000</p>
            </div>

            <div class="card">
                <img src="img/auto3.jpg" alt="Auto eléctrico moderno">
                <h3>Eléctrico Z</h3>
                <p>$18.000.000</p>
            </div>

        </div>
    </section>

    <!-- GALERÍA -->
    <section id="galeria">
        <h2>Galería</h2>
        <div class="galeria">
            <img src="img/auto1.jpg" alt="Auto 1">
            <img src="img/auto2.jpg" alt="Auto 2">
            <img src="img/auto3.jpg" alt="Auto 3">
            <img src="img/auto4.jpg" alt="Auto 4">
        </div>
    </section>

    <!-- FOOTER -->
    <footer id="contacto">
        <h3>Contacto</h3>
        <p>Teléfono: +56 9 1234 5678</p>
        <p>Email: james@email.com</p>
        <p>Dirección: Santiago, Chile</p>
        <p><a href="https://github.com/tuusuario" target="_blank">GitHub</a></p>
    </footer>

</body>
</html>
